name: Trigger RunPod Build

on:
  push:
    branches:
      - main

concurrency:
  group: runpod-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create Git tag for RunPod
        uses: actions/github-script@v7
        env:
          TAG_NAME: runpod-${{ github.sha }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag ${tag} already exists.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
              core.info(`Created tag ${tag}.`);
            }

      - name: Create GitHub release for RunPod
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runpod-${{ github.sha }}
          name: RunPod build ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: false
          prerelease: false
          body: |
            Automated release to trigger a RunPod rebuild from GitHub.

            Commit: ${{ github.sha }}
